<svg xmlns="http://www.w3.org/2000/svg" width="480" height="120" viewBox="0 0 480 120">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" rx="10" fill="#0f172a" />
  <g font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">
    <text x="24" y="60" fill="url(#g)">Loja RC Goiânia</text>
    <text x="24" y="96" fill="#94a3b8" font-size="14">Demo — hover/loop animation</text>
  </g>
  <g>
    <circle cx="420" cy="40" r="18" fill="#fff" opacity="0.06" />
    <circle cx="420" cy="40" r="12" fill="url(#g)">
      <animate attributeName="r" values="8;14;8" dur="1.6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.5;1" dur="1.6s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
